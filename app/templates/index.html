<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBOM 掃描平台</title>
  <meta name="description" content="上傳 ZIP 專案並執行 SBOM、漏洞與依賴分析">
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      background: #ffffff;
      color: #111;
    }

    main {
      max-width: 760px;
      margin: 40px auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #222;
    }

    form {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="file"] {
      display: block;
      width: 100%;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: 400;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #0b57d0;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #0842a0;
    }

    a:focus,
    button:focus,
    input:focus {
      outline: 3px solid #1a73e8;
      outline-offset: 2px;
    }

    .hint {
      color: #333;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>SBOM 掃描平台</h1>
    <p>上傳 ZIP 格式專案，系統將自動執行 SBOM 生成、漏洞掃描與依賴分析。</p>

    <form action="/scan" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="file">上傳 ZIP 專案檔</label>
        <p id="file-help" class="hint">請上傳 .zip 格式檔案，大小上限 50MB。</p>
        <input id="file" type="file" name="file" accept=".zip" aria-describedby="file-help" required>
      </div>

      <div class="form-group checkbox-group">
        <input id="gen_lock" type="checkbox" name="gen_lock">
        <label for="gen_lock">啟用 Lock generation</label>
      </div>

      <button type="submit">開始掃描</button>
    </form>
  </main>
</body>
</html>
